# Nginx site config for PATH_LAB_MVP (LabNexus)
# Install: sudo cp deploy/nginx.conf /etc/nginx/sites-available/pathlab
#          sudo ln -s /etc/nginx/sites-available/pathlab /etc/nginx/sites-enabled/
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx
#
# When you're ready to attach labnexus.in, replace `server_name _;` below with
# `server_name labnexus.in www.labnexus.in;` and re-run certbot (see AWS deploy guide).

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/PATH_LAB_MVP/frontend/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    client_max_body_size 50m;

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded report images
    location /uploads/ {
        proxy_pass http://127.0.0.1:5001/uploads/;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://127.0.0.1:5001/health;
    }

    # React SPA — client-side routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
