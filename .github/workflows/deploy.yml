name: Deploy to production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LABNEXUS_SSH_KEY }}

      - name: Deploy over SSH
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.LABNEXUS_HOST }} \
            'cd /home/ubuntu/apps/PATH_LAB_MVP && bash deploy/deploy.sh'
